project_name: "bgdude"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["dart run build_runner build --delete-conflicting-outputs succeeds (generated files are not committed)", "flutter analyze clean", "flutter test --coverage test/ green", "Line coverage did not drop -- at or above the ci.yml floor; any new testable code ships with its tests in the same change", "flutter build apk --debug succeeds (catches Android/Gradle/manifest breakage)", "gradlew :app:testDebugUnitTest green when native Kotlin changed", "doc/user-guide.html updated when the change is user-visible with screenshots", "Integration test added or extended when a screen/flow changed", "backlog item updated with comments"]
date_format: yyyy-mm-dd
max_column_width: 20
auto_open_browser: true
default_port: 6420
remote_operations: false
auto_commit: false
filesystem_only: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"

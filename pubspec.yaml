name: bgdude
description: >-
  Personal Tandem t:slim X2 companion + on-device insight engine.
  Read-only pump sync (via pumpx2), Health Connect context, deterministic
  dosing/what-if math, and on-device ML for BG prediction and insulin-sensitivity insight.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage (encrypted time-series)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  sqlcipher_flutter_libs: ^0.6.4
  path_provider: ^2.1.4
  path: ^1.9.0

  # Health Connect
  health: ^13.3.1

  # On-device ML (BG residual forecaster; pure-Dart models need no plugin)
  flutter_litert: ^0.1.0

  # Notifications & background scheduling
  flutter_local_notifications: ^17.2.2
  workmanager: ^0.5.2
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.69.0

  # Foreground-task helper (Flutter-side mirror of native pump service state)
  flutter_foreground_task: ^8.10.0

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  intl: ^0.19.0
  logging: ^1.2.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  drift_dev: ^2.20.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  pigeon: ^22.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/fixtures/

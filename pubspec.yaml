name: bgdude
description: >-
  Personal Tandem t:slim X2 companion + on-device insight engine.
  Read-only pump sync (via pumpx2), Health Connect context, deterministic
  dosing/what-if math, and on-device ML for BG prediction and insulin-sensitivity insight.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Storage (encrypted time-series). SQLCipher REPLACES sqlite3_flutter_libs —
  # never depend on both (identical native namespace; the manifest merge fails).
  drift: ^2.20.0
  sqlcipher_flutter_libs: ^0.6.4
  # Direct dep: database.dart calls sqlite3's open.dart to point drift at the
  # SQLCipher native library.
  sqlite3: ^2.4.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Health Connect
  health: ^13.3.1

  # On-device ML note: the current models (ridge/GBM, autotune, detectors) are pure
  # Dart. When the neural BG-residual model lands, add its runtime here (flutter_litert
  # or ONNX) behind the ResidualModel interface in lib/ml/forecaster.dart.

  # Notifications & background scheduling
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0
  timezone: ^0.10.1

  # Charts
  fl_chart: ^0.69.0

  # Foreground-task helper (Flutter-side mirror of native pump service state)
  flutter_foreground_task: ^8.10.0

  # Home-screen widget bridge
  home_widget: ^0.7.0

  # Runtime permission requests (Bluetooth, notifications)
  permission_handler: ^11.3.1

  # Android API level check (TASK-226): below API 31, BLE scanning needs runtime
  # ACCESS_FINE_LOCATION rather than the split bluetoothScan/bluetoothConnect perms.
  device_info_plus: ^12.4.0

  # Dart-side BLE for the standard Bluetooth Glucose Service (0x1808) — importing
  # fingersticks from a paired meter (e.g. Accu-Chek Guide Me). Separate from the pump's
  # native (blessed) bridge: a different device, on-demand sync rather than streaming.
  flutter_blue_plus: ^1.35.5

  # Networking (Nightscout bridge)
  http: ^1.2.2
  crypto: ^3.0.5

  # Utilities
  collection: ^1.18.0
  intl: ^0.19.0
  logging: ^1.2.0
  shared_preferences: ^2.3.2
  # Keystore-backed storage for the SQLCipher DB passphrase (TASK-8).
  flutter_secure_storage: ^9.2.2

  # Reporting export (clinician-ready PDF + raw CSV, shared via the system sheet)
  pdf: ^3.11.0
  share_plus: ^12.0.2

  # Barcode scanning for food lookup (CameraX/ML Kit; camera stays on-device).
  # 7.x pulls the 16 KB-page-aligned ML Kit barcode + CameraX native libs (required for
  # Android 15 / 16 KB-page devices; older 5.x shipped 4 KB-aligned libbarhopper /
  # libimage_processing_util_jni that fail the ELF alignment check).
  mobile_scanner: ^7.2.0

  # Nutrition-panel photo reader: on-device OCR of the label text + a camera/gallery
  # picker. The image is processed on-device (ML Kit) and never uploaded.
  google_mlkit_text_recognition: ^0.16.0
  image_picker: ^1.1.2

  # Optional small on-device LLM (Gemma) to normalise messy/foreign nutrition-panel OCR
  # into structured values. Model downloaded on demand (not bundled); deterministic parser
  # is the always-on fallback. flutter_gemma needs the AGP 8.x line (see android/).
  flutter_gemma: ^1.0.0
  flutter_gemma_mediapipe: ^1.0.3
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/fixtures/
    - assets/food/

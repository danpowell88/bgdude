# Publish the docs in doc/ to GitHub Pages.
#
# The doc/ folder is served as the site root, so doc/index.html is the landing page and
# doc/user-guide.html is the walk-through. Enable Pages once (repo Settings → Pages →
# Build and deployment → Source: "GitHub Actions") and this deploys on every push to main
# that touches the docs.
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'doc/**'
      - '.github/workflows/pages.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least-privilege token scopes required by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # Upload the doc/ folder as the site artifact (served at the site root).
      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

# Nightly + manually-dispatchable emulator job for the functional integration_test/
# suite (TASK-219). This resolves the TASK-159 policy question (nightly schedule +
# workflow_dispatch, NOT a per-push blocking job): the main ci.yml stays fast
# (~12 min) and blocking on every push; this runs the ~38 on-device functional tests
# separately, since GitHub's ubuntu runners have KVM (reactivecircus/android-emulator-
# runner works) but a real device/emulator boot + the full suite is too slow to gate
# every push on for a personal, single-developer project (decision-2).
#
# Excludes (same reasoning as CLAUDE.md's local-run guidance):
#  - screenshots_test.dart / walkthrough_test.dart: need `flutter drive`, not
#    `flutter test`.
#  - nutrition_ocr_accuracy_test.dart: needs real network + ~5 extra minutes --
#    --skip-network below (see tools/run_functional_integration_tests.sh).
#
# The file list itself lives in ONE place (tools/run_functional_integration_tests.sh),
# shared with local runs, per TASK-219 AC#3 -- not duplicated here.
name: Emulator tests (nightly)

on:
  schedule:
    # 03:00 UTC daily -- off-peak, long after any same-day push.
    - cron: '0 3 * * *'
  workflow_dispatch: {}

# Least-privilege token (CodeQL actions/missing-workflow-permissions, decision-11).
permissions:
  contents: read

jobs:
  functional-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # Issue #237: run the suite on the API level people are actually on (34) AND on
    # the floor the app claims to support (minSdk 29). A floor that is declared but
    # never exercised is a guess — the version-gated paths (pre-31 BLE permissions,
    # the untyped startForeground fallback) only run down there.
    #
    # continue-on-error on the floor image so a flake on an old, slow AVD reports as
    # a signal rather than redding the nightly and training everyone to ignore it.
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 34
            label: baseline
            required: true
          - api-level: 29
            label: floor
            required: false

    continue-on-error: ${{ !matrix.required }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      # TASK-218: same Gradle dependency/wrapper cache as the main CI workflow.
      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # TASK-288: same rationale as ci.yml -- retry a transient pub.dev blip
      # instead of redding the whole nightly run on it.
      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # KVM is available on GitHub-hosted ubuntu runners; without this the emulator
      # falls back to (much slower, often timing-out) software virtualization.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api${{ matrix.api-level }}-x86_64-v1

      - name: Create AVD + generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD created; snapshot cached for subsequent runs."

      - name: Run the functional integration suite
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash tools/run_functional_integration_tests.sh --skip-network

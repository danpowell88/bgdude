# CI workflow for bgdude (Flutter / Android-only)
#
# Runs code generation, static analysis, unit tests with a coverage gate, a
# debug APK build, and BLOCKING native Kotlin unit tests on every push / PR to
# main. The integration_test/ suite is manual-only (needs an emulator; see
# CLAUDE.md) — everything here must stay green for main to be green.
#
# (TASK-298 cache-hit verification commit: this comment-only edit does not
# touch any file the build_runner cache key hashes, so the next run should
# hit the cache populated by the previous run.)
#
# TASK-287: analyze / unit tests (TASK-297: sharded) / APK build / native
# tests run as independent parallel jobs instead of one sequential job,
# since the APK build in particular does not depend on the test result and
# was previously sitting on the critical path behind it for no reason. Each
# job re-resolves dependencies and re-invokes build_runner independently
# rather than sharing a generated-output artifact — simpler and lower-risk
# than making jobs depend on a prior codegen job. TASK-298 primes each
# job's build_runner run with a cache of its own incremental-build state
# (`.dart_tool/build`, keyed on a hash of pubspec.lock + all Dart sources)
# so an unchanged run is fast, but `build_runner build` is still ALWAYS
# invoked for real in every job — never skipped on a cache hit — so a
# stale or partial cache can only cost time, never silently pass stale
# generated code.
name: CI

on:
  push:
    # main only (post-merge verification). Task branches build via their PR (decision-9:
    # every task branch gets a PR, and the main ruleset requires these checks green on the
    # PR before merge) — building task-** pushes too would run every branch twice.
    branches: [main]
    # Docs cannot break the build; skip the pipeline for commits that touch
    # nothing else. (Task tracking lives in GitHub Issues, decision-13 — there
    # are no backlog bookkeeping commits anymore.)
    paths-ignore:
      - 'doc/**'
      - '**/*.md'
  pull_request:
    branches: [main]
  # Manual trigger — kick a build for any branch/ref that carries this workflow file.
  workflow_dispatch: {}

# Least-privilege token for every job (CodeQL actions/missing-workflow-permissions,
# decision-11): nothing here writes to the repo — artifact up/download uses the runtime
# token, not this one.
permissions:
  contents: read

# Newer pushes supersede in-flight runs of the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # TASK-288: pub.dev resolution is a real network dependency -- retry a
      # transient blip instead of redding the whole build on it.
      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      # TASK-298: build_runner's own incremental-build/asset-digest cache
      # (not final output -- this repo commits only one generated file,
      # lib/data/database.g.dart; everything else here is drift_dev's
      # per-file analysis cache). Priming it lets build_runner's own
      # digest comparison skip re-analyzing ~1400 unchanged inputs; the
      # real command below still ALWAYS runs, so a stale/partial cache can
      # only cost time, never correctness -- build_runner itself detects
      # and rebuilds whatever actually changed.
      - name: Cache build_runner state
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**/*.dart', 'test/**/*.dart', 'integration_test/**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      # MUST run before analyze since generated files are not committed.
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

  # TASK-297: the unit-test suite (1185+ tests, one process) was the test
  # job's dominant cost. Sharded across 4 matrix jobs so the dominant cost
  # runs in parallel; each shard uploads its own coverage, and a separate
  # coverage-gate job merges them with `lcov --add-tracefile` (which sums
  # per-line hit counts for files touched by more than one shard, so the
  # merged percentage is exact, not a naive/double-counted concatenation)
  # before running the same floor check as before sharding.
  #
  # TASK-301: the original split used a hand-maintained case statement of
  # test/ subdirectories, which silently drops any *_test.dart landing under
  # a directory nobody remembers to add to the list -- analyze/test would
  # stay green on an untested file with no signal at all. `flutter test`'s
  # own --total-shards/--shard-index discovers every test file itself, so
  # nothing can go unlisted; verified locally all 4 shards sum to exactly
  # the unsharded total (1314 tests), no gaps or overlap.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # TASK-288: pub.dev resolution is a real network dependency -- retry a
      # transient blip instead of redding the whole build on it.
      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      # TASK-298: see the analyze job's identically-keyed cache step for
      # rationale. Every shard hits the same cache key (all 4 benefit from
      # one another's cache writes across runs); build_runner still always
      # runs for real, so this only affects speed.
      - name: Cache build_runner state
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**/*.dart', 'test/**/*.dart', 'integration_test/**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Unit tests with line-coverage measurement (TASK-159), sharded
      # (TASK-297/301). The integration_test/ suite needs an emulator and is
      # DELIBERATELY manual-only: run it locally per CLAUDE.md ("Emulator
      # (integration) tests for every feature") — an emulator job on hosted
      # runners is slow/flaky and this is a personal, single-device project.
      - name: Unit tests (with coverage) — shard ${{ matrix.shard }}
        run: |
          flutter test --coverage --total-shards=4 --shard-index=$(( ${{ matrix.shard }} - 1 )) test/

      - name: Upload shard coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage/lcov.info

  coverage-gate:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # actions:read on top of the workflow-level contents:read — the ratchet step below
    # downloads the coverage baseline artifact from the latest successful main run.
    permissions:
      contents: read
      actions: read
    steps:
      - name: Download shard coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-shard-*
          path: shard-coverage

      # TASK-301: `empty` deliberately dropped from --ignore-errors -- it was
      # silently tolerating a shard that contributed zero coverage (e.g. a
      # shard whose `flutter test` step failed to even write lcov.info), the
      # one signal that would otherwise catch a shard silently missing from
      # the merge. `inconsistent,corrupt` stay ignored: expected, benign
      # cross-shard warnings when the same source file is touched by more
      # than one shard's run.
      - name: Merge shard coverage
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lcov
          mkdir -p coverage
          args=()
          for f in shard-coverage/*/lcov.info; do args+=(--add-tracefile "$f"); done
          lcov "${args[@]}" -o coverage/lcov.info --ignore-errors inconsistent,corrupt

      # Coverage gate (TASK-159): fail on a coverage collapse. Threshold is
      # a floor, not a target — raise it as coverage grows (67.6% on
      # 2026-07-08, TASK-245; 67.4% on 2026-07-08, TASK-275). Generated
      # files (lib/data/database.g.dart -- drift's generated schema/query
      # code, the one *.g.dart committed to the repo, see SETUP.md) are
      # excluded (TASK-274): most of its lines are boilerplate the app
      # never calls, and it dilutes the score without reflecting real
      # hand-written-code coverage. UI screens (lib/ui/**) are deliberately
      # NOT chased here — they're covered by integration_test/ (see
      # CLAUDE.md), not unit tests; the floor leaves headroom for that gap
      # rather than penalizing it.
      - name: Coverage gate
        run: |
          read -r hit total <<< "$(awk -F: '
            /^SF:/ { skip = ($0 ~ /database\.g\.dart$/) }
            /^LH:/ && !skip { h += $2 }
            /^LF:/ && !skip { t += $2 }
            END { print h, t }
          ' coverage/lcov.info)"
          pct=$(awk "BEGIN {printf \"%.1f\", 100*$hit/$total}")
          echo "Line coverage: $pct% ($hit/$total lines, excluding generated files)"
          echo "$pct" > coverage-percent.txt
          awk "BEGIN {exit !($pct >= 65.0)}" || { echo "::error::Line coverage $pct% is below the 65% minimum"; exit 1; }

      # Baseline for the no-drop ratchet below: every successful run (main pushes are the
      # ones the ratchet consumes) publishes its coverage percentage as a tiny artifact.
      - name: Upload coverage percent (ratchet baseline)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-percent
          path: coverage-percent.txt

      # No-drop coverage ratchet (the free stand-in for GitHub's "Restrict code coverage"
      # ruleset rule, unavailable on a user-owned Free repo — decision-11). The 65% floor
      # above catches collapse; this catches erosion: a PR may not land with lower line
      # coverage than the latest successful main run (0.1pt tolerance for rounding). If
      # a change genuinely must lower coverage, that is a reviewer decision, not a bypass:
      # add tests until it recovers.
      - name: Coverage no-drop ratchet vs main (PRs only)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?branch=main&status=success&event=push&per_page=1" \
            --jq '.workflow_runs[0].id // empty')
          if [ -z "$run_id" ]; then
            echo "::notice::No successful main CI run found — skipping the no-drop ratchet"; exit 0
          fi
          if ! gh run download "$run_id" --repo "$GITHUB_REPOSITORY" -n coverage-percent -D baseline 2>/dev/null; then
            echo "::notice::main run $run_id predates the coverage-percent artifact — skipping the no-drop ratchet"; exit 0
          fi
          base=$(cat baseline/coverage-percent.txt)
          pct=$(cat coverage-percent.txt)
          echo "PR line coverage: $pct% — main baseline (run $run_id): $base%"
          awk "BEGIN {exit !($pct >= $base - 0.1)}" || {
            echo "::error::Line coverage dropped: $pct% on this PR vs $base% on main — add tests for the new code (coverage is a ratchet, see CLAUDE.md)"; exit 1
          }

  apk-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # TASK-299: fail the build if android/gradle/wrapper/gradle-wrapper.jar doesn't
      # match one of Gradle's own published checksums -- a tampered or unknown-provenance
      # wrapper jar (the exact class of issue the TASK-287 hotfix committing one raised)
      # is caught automatically instead of silently trusted.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      # Required for the Android/Gradle build (compileSdk 36).
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      # Cache Gradle dependencies + wrapper (TASK-218).
      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # TASK-288: pub.dev resolution is a real network dependency -- retry a
      # transient blip instead of redding the whole build on it.
      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      # TASK-298: see the analyze job's identically-keyed cache step for
      # rationale.
      - name: Cache build_runner state
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**/*.dart', 'test/**/*.dart', 'integration_test/**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Pulls pumpx2/blessed from JitPack (network available). TASK-301: NOT
      # retry-wrapped -- unlike a pure dependency-resolution step, this
      # command also compiles Dart and Kotlin, and there is no equally clean
      # single-purpose Gradle/Flutter task to isolate resolution from
      # compilation for an APK build the way native-tests' warm-up step does.
      # A blind retry here would risk masking a real, rare compile failure as
      # readily as it catches a genuine Maven/JitPack blip. The already
      # retried "Install dependencies" step above catches the large majority
      # of transient network failures; a resolution blip that survives to
      # this step is rare enough to accept as a real (rerunnable) failure.
      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bgdude-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  native-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # TASK-299: same wrapper-provenance check as apk-build.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # No build_runner here: the native Kotlin suite (android/app/src/test)
      # does not consume any Dart-generated (*.g.dart) output -- this project
      # uses plain MethodChannel, not Pigeon codegen, for the Dart/Kotlin
      # bridge. `pub get` alone is still required: it writes
      # .flutter-plugins/.flutter-plugins-dependencies, which the Flutter
      # Gradle plugin reads to register plugin modules even for a
      # Kotlin-only test run.
      # TASK-288: pub.dev resolution is a real network dependency -- retry a
      # transient blip instead of redding the whole build on it.
      - name: Install dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      # local.properties is written deterministically (flutter-action exports
      # FLUTTER_ROOT; ANDROID_HOME / ANDROID_SDK_ROOT is set on the hosted
      # runner) -- its own step since both the warm-up and the real test run
      # below need it, and it is a plain local file write, nothing to retry.
      - name: Write local.properties
        run: |
          FLUTTER_SDK="${FLUTTER_ROOT:-$(dirname "$(dirname "$(command -v flutter)")")}"
          ANDROID_SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          if [ -z "$FLUTTER_SDK" ] || [ -z "$ANDROID_SDK" ]; then
            echo "::error::Could not resolve FLUTTER_SDK ('$FLUTTER_SDK') or ANDROID_SDK ('$ANDROID_SDK')"; exit 1
          fi
          printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_SDK" "$ANDROID_SDK" > android/local.properties

      # TASK-301: the old single retried command wrapped test EXECUTION, not
      # just Gradle's dependency resolution -- an intermittent native-test
      # failure would quietly pass on attempt 2, masking a flake in exactly
      # the tests that guard the read-only-pump charter and the mU→U
      # conversions (the highest-value place a masked failure could hide).
      # Robolectric's own android-all-instrumented SDK jar is fetched via its
      # own resolver the first time any @Config(sdk=...) level is used at
      # TEST RUNTIME, not at Gradle's normal dependency-resolution time, and
      # is NOT covered by gradle/actions/setup-gradle's cache (~/.gradle
      # only) -- so it is a real, separate network dependency hiding inside
      # what looked like "just run the tests". Every Robolectric class here
      # uses the same @Config(sdk=[34]), so running any one of them warms
      # that fetch for the whole suite. This step's outcome is deliberately
      # ignored (continue-on-error) -- its only job is populating the local
      # Maven cache as a side effect before the real, ungated run below.
      - name: Warm the Robolectric SDK-jar cache (network-dependent, retried)
        continue-on-error: true
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            cd android && ./gradlew :app:testDebugUnitTest --tests "com.bgdude.app.pump.PairingWindowTimeoutTest" --no-daemon

      # Native Kotlin unit tests (android/app/src/test) — BLOCKING
      # (TASK-159): ProtocolProbeTest guards the read-only-pump guarantee
      # and PumpResponseMapperTest guards the mU→U conversions; a red
      # native suite must fail the build. NOT retried (TASK-301): by this
      # point Gradle's dependencies and Robolectric's SDK jar are already
      # resolved/cached from the warm-up step above, so a failure here is a
      # genuine test/build problem, not a network blip, and must actually
      # fail the build rather than get a free second attempt.
      - name: Native unit tests
        run: cd android && ./gradlew :app:testDebugUnitTest --no-daemon

# CI workflow for bgdude (Flutter / Android-only)
#
# Runs code generation, static analysis, unit tests with a coverage gate, a
# debug APK build, and BLOCKING native Kotlin unit tests on every push / PR to
# main. The integration_test/ suite is manual-only (needs an emulator; see
# CLAUDE.md) — everything here must stay green for main to be green.
#
# (TASK-298 cache-hit verification commit: this comment-only edit does not
# touch any file the build_runner cache key hashes, so the next run should
# hit the cache populated by the previous run.)
#
# TASK-287: analyze / unit tests (TASK-297: sharded) / APK build / native
# tests run as independent parallel jobs instead of one sequential job,
# since the APK build in particular does not depend on the test result and
# was previously sitting on the critical path behind it for no reason. Each
# job re-resolves dependencies and re-invokes build_runner independently
# rather than sharing a generated-output artifact — simpler and lower-risk
# than making jobs depend on a prior codegen job. TASK-298 primes each
# job's build_runner run with a cache of its own incremental-build state
# (`.dart_tool/build`, keyed on a hash of pubspec.lock + all Dart sources)
# so an unchanged run is fast, but `build_runner build` is still ALWAYS
# invoked for real in every job — never skipped on a cache hit — so a
# stale or partial cache can only cost time, never silently pass stale
# generated code.
name: CI

on:
  push:
    branches: [main]
    # Docs and backlog files cannot break the build; skip the pipeline for
    # commits that touch nothing else.
    paths-ignore:
      - 'backlog/**'
      - 'doc/**'
      - '**/*.md'
  pull_request:
    branches: [main]

# Newer pushes supersede in-flight runs of the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # TASK-288: pub.dev resolution is a real network dependency -- retry a
      # transient blip instead of redding the whole build on it.
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      # TASK-298: build_runner's own incremental-build/asset-digest cache
      # (not final output -- this repo commits only one generated file,
      # lib/data/database.g.dart; everything else here is drift_dev's
      # per-file analysis cache). Priming it lets build_runner's own
      # digest comparison skip re-analyzing ~1400 unchanged inputs; the
      # real command below still ALWAYS runs, so a stale/partial cache can
      # only cost time, never correctness -- build_runner itself detects
      # and rebuilds whatever actually changed.
      - name: Cache build_runner state
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**/*.dart', 'test/**/*.dart', 'integration_test/**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      # MUST run before analyze since generated files are not committed.
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

  # TASK-297: the unit-test suite (1185+ tests, one process) was the test
  # job's dominant cost. Sharded across 4 matrix jobs by test/ subdirectory
  # (test/ is grouped by feature area since TASK-276) so the dominant cost
  # runs in parallel; each shard uploads its own coverage, and a separate
  # coverage-gate job merges them with `lcov --add-tracefile` (which sums
  # per-line hit counts for files touched by more than one shard, so the
  # merged percentage is exact, not a naive/double-counted concatenation)
  # before running the same floor check as before sharding.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # TASK-288: pub.dev resolution is a real network dependency -- retry a
      # transient blip instead of redding the whole build on it.
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      # TASK-298: see the analyze job's identically-keyed cache step for
      # rationale. Every shard hits the same cache key (all 4 benefit from
      # one another's cache writes across runs); build_runner still always
      # runs for real, so this only affects speed.
      - name: Cache build_runner state
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**/*.dart', 'test/**/*.dart', 'integration_test/**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Unit tests with line-coverage measurement (TASK-159), sharded
      # (TASK-297). The integration_test/ suite needs an emulator and is
      # DELIBERATELY manual-only: run it locally per CLAUDE.md ("Emulator
      # (integration) tests for every feature") — an emulator job on hosted
      # runners is slow/flaky and this is a personal, single-device project.
      - name: Unit tests (with coverage) — shard ${{ matrix.shard }}
        run: |
          case ${{ matrix.shard }} in
            1) dirs="test/insights test/core test/weather test/profile test/onboarding test/feedback" ;;
            2) dirs="test/ml test/data test/meals test/dev" ;;
            3) dirs="test/state test/analytics test/support test/logging test/timeline" ;;
            4) dirs="test/ui test/reports test/pump test/integrations test/food" ;;
          esac
          flutter test --coverage $dirs

      - name: Upload shard coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage/lcov.info

  coverage-gate:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download shard coverage
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-shard-*
          path: shard-coverage

      - name: Merge shard coverage
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lcov
          mkdir -p coverage
          args=()
          for f in shard-coverage/*/lcov.info; do args+=(--add-tracefile "$f"); done
          lcov "${args[@]}" -o coverage/lcov.info --ignore-errors inconsistent,corrupt,empty

      # Coverage gate (TASK-159): fail on a coverage collapse. Threshold is
      # a floor, not a target — raise it as coverage grows (67.6% on
      # 2026-07-08, TASK-245; 67.4% on 2026-07-08, TASK-275). Generated
      # files (lib/data/database.g.dart -- drift's generated schema/query
      # code, the one *.g.dart committed to the repo, see SETUP.md) are
      # excluded (TASK-274): most of its lines are boilerplate the app
      # never calls, and it dilutes the score without reflecting real
      # hand-written-code coverage. UI screens (lib/ui/**) are deliberately
      # NOT chased here — they're covered by integration_test/ (see
      # CLAUDE.md), not unit tests; the floor leaves headroom for that gap
      # rather than penalizing it.
      - name: Coverage gate
        run: |
          read -r hit total <<< "$(awk -F: '
            /^SF:/ { skip = ($0 ~ /database\.g\.dart$/) }
            /^LH:/ && !skip { h += $2 }
            /^LF:/ && !skip { t += $2 }
            END { print h, t }
          ' coverage/lcov.info)"
          pct=$(awk "BEGIN {printf \"%.1f\", 100*$hit/$total}")
          echo "Line coverage: $pct% ($hit/$total lines, excluding generated files)"
          awk "BEGIN {exit !($pct >= 65.0)}" || { echo "::error::Line coverage $pct% is below the 65% minimum"; exit 1; }

  apk-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TASK-299: fail the build if android/gradle/wrapper/gradle-wrapper.jar doesn't
      # match one of Gradle's own published checksums -- a tampered or unknown-provenance
      # wrapper jar (the exact class of issue the TASK-287 hotfix committing one raised)
      # is caught automatically instead of silently trusted.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Required for the Android/Gradle build (compileSdk 36).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Cache Gradle dependencies + wrapper (TASK-218).
      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # TASK-288: pub.dev resolution is a real network dependency -- retry a
      # transient blip instead of redding the whole build on it.
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      # TASK-298: see the analyze job's identically-keyed cache step for
      # rationale.
      - name: Cache build_runner state
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock', 'lib/**/*.dart', 'test/**/*.dart', 'integration_test/**/*.dart') }}
          restore-keys: |
            ${{ runner.os }}-build-runner-

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Pulls pumpx2/blessed from JitPack (network available) -- retry-wrapped
      # (TASK-288) since a Maven/JitPack dependency-resolution blip is a
      # transient network failure, not a build defect.
      - name: Build debug APK
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 15
          command: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bgdude-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  native-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TASK-299: same wrapper-provenance check as apk-build.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      # No build_runner here: the native Kotlin suite (android/app/src/test)
      # does not consume any Dart-generated (*.g.dart) output -- this project
      # uses plain MethodChannel, not Pigeon codegen, for the Dart/Kotlin
      # bridge. `pub get` alone is still required: it writes
      # .flutter-plugins/.flutter-plugins-dependencies, which the Flutter
      # Gradle plugin reads to register plugin modules even for a
      # Kotlin-only test run.
      # TASK-288: pub.dev resolution is a real network dependency -- retry a
      # transient blip instead of redding the whole build on it.
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: flutter pub get

      # Native Kotlin unit tests (android/app/src/test) — BLOCKING
      # (TASK-159): ProtocolProbeTest guards the read-only-pump guarantee
      # and PumpResponseMapperTest guards the mU→U conversions; a red
      # native suite must fail the build. local.properties is written
      # deterministically first (flutter-action exports FLUTTER_ROOT;
      # ANDROID_HOME / ANDROID_SDK_ROOT is set on the hosted runner).
      # Retry-wrapped (TASK-288): the first invocation triggers Gradle's own
      # dependency resolution (Maven/Google), a real network dependency
      # distinct from the Kotlin compile/test work itself.
      - name: Native unit tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 15
          command: |
            FLUTTER_SDK="${FLUTTER_ROOT:-$(dirname "$(dirname "$(command -v flutter)")")}"
            ANDROID_SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
            if [ -z "$FLUTTER_SDK" ] || [ -z "$ANDROID_SDK" ]; then
              echo "::error::Could not resolve FLUTTER_SDK ('$FLUTTER_SDK') or ANDROID_SDK ('$ANDROID_SDK')"; exit 1
            fi
            printf 'flutter.sdk=%s\nsdk.dir=%s\n' "$FLUTTER_SDK" "$ANDROID_SDK" > android/local.properties
            cd android && ./gradlew :app:testDebugUnitTest --no-daemon

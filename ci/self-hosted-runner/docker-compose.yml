# Minimal bgdude self-hosted CI runner for Unraid — STOCK image, no build required.
# The toolchain (JDK/Android SDK/Flutter) is installed per-job by the workflow steps
# (setup-java + setup-android + flutter-action), so this container is just the plain runner.
#   docker compose --env-file .env up -d
# (or add it straight from the Unraid Docker UI — see README "Minimal quickstart".)
#
# Want faster jobs (SDKs baked in, no per-job install)? Build the Dockerfile in this folder
# instead and swap `image:` for `build: .` — see README "Optional: bake the SDKs for speed".
services:
  bgdude-runner:
    image: myoung34/github-runner:latest
    container_name: bgdude-ci-runner
    restart: unless-stopped
    environment:
      REPO_URL: "https://github.com/danpowell88/bgdude"
      RUNNER_SCOPE: "repo"
      # Fine-grained PAT (repo Administration: Read+Write) so the runner self-registers. See .env.example.
      ACCESS_TOKEN: "${GH_RUNNER_PAT}"
      RUNNER_NAME: "unraid-bgdude"
      LABELS: "self-hosted,linux,x64,unraid"
      RUN_AS_ROOT: "true"          # simplest — lets setup-android/flutter write to the tool cache freely
    volumes:
      # Persist the work dir so tool-cache installs + git checkouts survive restarts (big speedup).
      - "/mnt/user/appdata/bgdude-runner/_work:/actions-runner/_work"
    # Security (public repo): the runner only ever runs YOUR refs — the workflow's fork-PR guard
    # keeps untrusted fork PRs on GitHub-hosted runners. That guard is the real control; this box
    # is a persistent trusted runner, so ephemeral/fresh-FS churn is unnecessary (see README).

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "0.1.0"

// Toggle: build pumpx2 from a local ~/.m2 publish instead of JitPack.
def useLocalPumpx2 = localProperties.getProperty("use_local_pumpx2") == "true"
def pumpx2Version = localProperties.getProperty("pumpx2_version") ?: "1.9.0"

android {
    namespace = "com.bgdude.app"
    compileSdk = 36

    ndkVersion = flutter.ndkVersion

    compileOptions {
        // Required by health-connect / desugared libs used transitively.
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.bgdude.app"
        minSdk = 29
        targetSdk = 37
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            // Personal build: sign with debug for now; swap in a real keystore later.
            signingConfig = signingConfigs.debug
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"),
                    "proguard-rules.pro"
        }
    }

    // TASK-186: Robolectric needs the merged manifest + resources on the unit-test classpath.
    testOptions {
        unitTests {
            includeAndroidResources = true
        }
    }

    // Issue #331: Android Lint is a CI merge gate (ci.yml android-lint job). The baseline
    // freezes the 44 pre-existing warnings (burn-down tracked separately); with
    // warningsAsErrors, any NEW warning fails the build rather than accreting silently.
    // To regenerate after intentional fixes: delete lint-baseline.xml and run
    // `./gradlew :app:lintDebug` twice (first run writes the baseline, second verifies).
    lint {
        baseline = file("lint-baseline.xml")
        warningsAsErrors = true
        abortOnError = true
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.2"

    if (useLocalPumpx2) {
        // Requires `./gradlew publishToMavenLocal` in a pumpx2 checkout.
        implementation "com.jwoglom.pumpx2:pumpx2-android:${pumpx2Version}"
        implementation "com.jwoglom.pumpx2:pumpx2-messages:${pumpx2Version}"
        implementation "com.jwoglom.pumpx2:pumpx2-shared:${pumpx2Version}"
    } else {
        // JitPack coordinates (github.com/jwoglom/pumpX2).
        implementation "com.github.jwoglom.pumpX2:pumpx2-android:${pumpx2Version}"
        implementation "com.github.jwoglom.pumpX2:pumpx2-messages:${pumpx2Version}"
        implementation "com.github.jwoglom.pumpX2:pumpx2-shared:${pumpx2Version}"
    }

    // Blessed is declared runtime-scope in pumpx2's POM, but our TandemPump subclass
    // references BluetoothPeripheral/HciStatus directly, so it must be on the compile
    // classpath too. Version must match the pumpx2 POM.
    implementation "com.github.weliem:blessed-android:2.4.0"

    // Garmin Connect IQ Mobile SDK (free) — pushes BG to the watch app in garmin/.
    implementation "com.garmin.connectiq:ciq-companion-app-sdk:2.0.3@aar"

    implementation "androidx.core:core-ktx:1.13.1"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"

    // JVM unit tests for pure native pump logic (PumpResponseMapper, MutableSnapshot).
    testImplementation "junit:junit:4.13.2"
    // Real org.json on the unit-test classpath so PumpProfileMapper's JSON output can be
    // asserted (Android's bundled org.json is a throwing stub under JVM unit tests).
    testImplementation "org.json:json:20231013"
    // TASK-186: PumpService/BootReceiver lifecycle tests need a real (shadowed) Android
    // framework — Context, Service, NotificationManager, BroadcastReceiver dispatch.
    testImplementation "org.robolectric:robolectric:4.13"
    testImplementation "androidx.test:core:1.6.1"
    // TASK-186: BluetoothPeripheral has no public constructor (blessed-android owns
    // construction internally), so the reconnect-on-disconnect test needs a mock.
    testImplementation "org.mockito:mockito-core:5.14.2"
}

org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=false
kotlin.code.style=official
# NOTE: built-in Kotlin (android.builtInKotlin=true) is the future direction, but it is
# mutually exclusive with plugins that still apply the standalone Kotlin Gradle Plugin —
# device_info_plus, health, home_widget, flutter_foreground_task, workmanager_android all
# do. Until those upstream plugins migrate, we stay on KGP. The Flutter "migrate to
# built-in Kotlin" warning is therefore expected and cannot be resolved app-side yet.
android.builtInKotlin=false
android.newDsl=false
